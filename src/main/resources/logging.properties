# CubeArray logging configuration
# FileHandler is added programmatically in AppLogger.init() so the path can use
# ResourceUtils.getInstallPath(). This file controls levels and the formatter pattern only.

handlers = java.util.logging.ConsoleHandler

# Root logger: INFO and above
.level = INFO

# Console: WARNING and above (mirrors current System.err behaviour)
java.util.logging.ConsoleHandler.level     = WARNING
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Shared formatter: timestamp  level  logger  message  exception
java.util.logging.SimpleFormatter.format = %1$tF %1$tT.%1$tL [%4$-7s] %2$s%n%5$s%6$s%n
