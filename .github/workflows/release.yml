name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Stage clean input for jpackage
        shell: cmd
        run: |
          mkdir staging
          copy "target\CubeArray-1.1-app.jar" "staging\CubeArray.jar"

      - name: Build app image (exe)
        shell: cmd
        run: |
          jpackage --input staging\ --name CubeArray --main-jar CubeArray.jar --main-class org.ironsight.cubearray.CubeArrayMain --type app-image --dest dist\

      - name: Copy JAR and README into app-image
        shell: cmd
        run: |
          copy "staging\CubeArray.jar" "dist\CubeArray\CubeArray.jar"
          copy "release\README.txt" "dist\CubeArray\README.txt"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create exe ZIP (with bundled JRE)
        shell: powershell
        run: |
          Compress-Archive -Path "dist\CubeArray\*" -DestinationPath "dist\CubeArray-${{ steps.version.outputs.version }}-win-exe.zip"

      - name: Create jar-only ZIP (requires Java 17+)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "dist\jar-only" -Force
          Copy-Item "staging\CubeArray.jar" "dist\jar-only\CubeArray.jar"
          Copy-Item "release\README.txt" "dist\jar-only\README.txt"
          Compress-Archive -Path "dist\jar-only\*" -DestinationPath "dist\CubeArray-${{ steps.version.outputs.version }}-win-jar.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          name: CubeArray ${{ steps.version.outputs.version }}
          files: |
            dist/CubeArray-${{ steps.version.outputs.version }}-win-exe.zip
            dist/CubeArray-${{ steps.version.outputs.version }}-win-jar.zip
