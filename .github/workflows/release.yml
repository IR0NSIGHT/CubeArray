name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build fat JAR
        run: mvn clean package

      - name: Build app image (exe)
        shell: cmd
        run: |
          jpackage --input target/ --name CubeArray --main-jar CubeArray.jar --main-class org.ironsight.CubeArray.CubeArrayMain --type app-image --dest dist/

      - name: Copy JAR and README into app-image
        shell: cmd
        run: |
          copy "target\CubeArray.jar" "dist\CubeArray\CubeArray.jar"
          copy "release\README.txt" "dist\CubeArray\README.txt"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive -Path "dist\CubeArray\*" -DestinationPath "dist\CubeArray-${{ steps.version.outputs.version }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CubeArray ${{ steps.version.outputs.version }}
          files: dist/CubeArray-${{ steps.version.outputs.version }}.zip
